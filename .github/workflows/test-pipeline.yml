name: Test Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Пересобрать и задеплоить все модули"
        type: boolean
        default: false

# One test deployment at a time; newer push cancels the queued one
concurrency:
  group: test-pipeline-${{ github.event_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── CI: runs on push and pull_request ────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  # ── CD: only on push to develop ──────────────────────────────────────────────
  changes:
    name: Detect changes
    needs: lint-and-typecheck
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      bot: ${{ steps.filter.outputs.bot }}
      worker: ${{ steps.filter.outputs.worker }}
      webapp: ${{ steps.filter.outputs.webapp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        run: |
          set -e

          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin refs/tags/test-deployed:refs/tags/test-deployed 2>/dev/null || true

          if ! git rev-parse --verify test-deployed >/dev/null 2>&1; then
            echo "No test-deployed tag — building everything"
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only test-deployed HEAD)
          echo "Changed files since test-deployed:"
          echo "$changed"

          match() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          echo "api=$(match    '^(packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.api)')"    >> "$GITHUB_OUTPUT"
          echo "bot=$(match    '^(packages/bot|packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.bot)')"    >> "$GITHUB_OUTPUT"
          echo "worker=$(match '^(packages/worker|packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.worker)')" >> "$GITHUB_OUTPUT"
          echo "webapp=$(match '^(packages/webapp|packages/shared|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.webapp)')"     >> "$GITHUB_OUTPUT"

  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-api:test
            ghcr.io/${{ github.repository_owner }}/metabox-api:test-${{ github.sha }}
          cache-from: type=gha,scope=api-test
          cache-to: type=gha,scope=api-test,mode=max

  build-bot:
    name: Build Bot
    needs: changes
    if: needs.changes.outputs.bot == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bot
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-bot:test
            ghcr.io/${{ github.repository_owner }}/metabox-bot:test-${{ github.sha }}
          cache-from: type=gha,scope=bot-test
          cache-to: type=gha,scope=bot-test,mode=max

  build-worker:
    name: Build Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-worker:test
            ghcr.io/${{ github.repository_owner }}/metabox-worker:test-${{ github.sha }}
          cache-from: type=gha,scope=worker-test
          cache-to: type=gha,scope=worker-test,mode=max

  build-webapp:
    name: Build & deploy webapp
    needs: changes
    if: needs.changes.outputs.webapp == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build webapp
        run: pnpm --filter @metabox/webapp build
        env:
          VITE_API_BASE_URL: ${{ secrets.TEST_VITE_API_BASE_URL }}
          VITE_BOT_USERNAME: ${{ secrets.TEST_VITE_BOT_USERNAME }}
          VITE_LEARNING_URL: ${{ secrets.TEST_VITE_LEARNING_URL }}
          VITE_METABOX_LANDING_URL: ${{ secrets.TEST_VITE_METABOX_LANDING_URL }}
      - name: Clear webapp dir on test VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          script: rm -rf /var/www/metabox-ai-test/*
      - name: Upload webapp dist to test VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          source: "packages/webapp/dist/*"
          target: /var/www/metabox-ai-test
          strip_components: 3

  deploy:
    name: Deploy to test VPS
    runs-on: ubuntu-latest
    needs: [changes, build-api, build-bot, build-worker, build-webapp]
    permissions:
      contents: write
    if: |
      always() && !cancelled() &&
      (needs.build-api.result == 'success' ||
       needs.build-bot.result == 'success' ||
       needs.build-worker.result == 'success') &&
      needs.build-api.result != 'failure' &&
      needs.build-bot.result != 'failure' &&
      needs.build-worker.result != 'failure'
    steps:
      - name: Deploy on test VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: test-${{ github.sha }}
          GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
          BUILT_API: ${{ needs.build-api.result == 'success' && 'true' || 'false' }}
          BUILT_BOT: ${{ needs.build-bot.result == 'success' && 'true' || 'false' }}
          BUILT_WORKER: ${{ needs.build-worker.result == 'success' && 'true' || 'false' }}
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE_TAG,GHCR_IMAGE_PREFIX,BUILT_API,BUILT_BOT,BUILT_WORKER
          script: |
            set -e
            cd /opt/metaboxaibot-test

            echo "Logging in to ghcr.io..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Updating repo (compose file, nginx config)..."
            git -c "url.https://x-access-token:${GHCR_TOKEN}@github.com/.insteadOf=https://github.com/" pull origin develop

            echo "Updating IMAGE_TAG and GHCR_IMAGE_PREFIX in .env..."
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env \
              || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            sed -i "s|^GHCR_IMAGE_PREFIX=.*|GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX|" .env \
              || echo "GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX" >> .env

            # Pull only services that were actually rebuilt
            SERVICES=""
            [ "$BUILT_API" = "true" ] && SERVICES="$SERVICES api"
            [ "$BUILT_BOT" = "true" ] && SERVICES="$SERVICES bot"
            [ "$BUILT_WORKER" = "true" ] && SERVICES="$SERVICES worker"

            if [ -n "$SERVICES" ]; then
              echo "Pulling new images:$SERVICES"
              docker compose -f docker-compose.test.yml pull $SERVICES
            else
              echo "No new images to pull"
            fi

            echo "Restarting services..."
            docker compose -f docker-compose.test.yml up -d --no-build --remove-orphans

            echo "Pruning old images..."
            docker image prune -af

            sudo nginx -t && sudo nginx -s reload

            echo "Test deploy complete — $IMAGE_TAG"

      - name: Mark deployed SHA
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/test-deployed',
                sha,
                force: true,
              });
            } catch {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/test-deployed',
                sha,
              });
            }
