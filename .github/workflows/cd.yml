name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only one deployment at a time; a newer push cancels the queued one
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Detect which modules changed ────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    outputs:
      api: ${{ steps.filter.outputs.api }}
      bot: ${{ steps.filter.outputs.bot }}
      worker: ${{ steps.filter.outputs.worker }}
      webapp: ${{ steps.filter.outputs.webapp }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # Compares HEAD against the last deployed tag via plain git diff.
      # Falls back to building everything when the tag doesn't exist yet.
      - name: Detect changes
        id: filter
        run: |
          set -e

          git fetch origin refs/tags/prod-deployed:refs/tags/prod-deployed 2>/dev/null || true

          if ! git rev-parse --verify prod-deployed >/dev/null 2>&1; then
            echo "No prod-deployed tag found — building everything"
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only prod-deployed HEAD)
          echo "Changed files since prod-deployed:"
          echo "$changed"

          match() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          echo "api=$(match    '^(packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.api)')"    >> "$GITHUB_OUTPUT"
          echo "bot=$(match    '^(packages/bot|packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.bot)')"    >> "$GITHUB_OUTPUT"
          echo "worker=$(match '^(packages/worker|packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.worker)')" >> "$GITHUB_OUTPUT"
          echo "webapp=$(match '^(packages/webapp|packages/shared|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.webapp)')" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker images ───────────────────────────────────────────────
  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-api:latest
            ghcr.io/${{ github.repository_owner }}/metabox-api:${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-bot:
    name: Build Bot
    needs: changes
    if: needs.changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bot
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-bot:latest
            ghcr.io/${{ github.repository_owner }}/metabox-bot:${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,scope=bot,mode=max

  build-worker:
    name: Build Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-worker:latest
            ghcr.io/${{ github.repository_owner }}/metabox-worker:${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  # ── Build React webapp and upload to VPS ────────────────────────────────────
  build-webapp:
    name: Build & deploy webapp
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build webapp
        run: pnpm --filter @metabox/webapp build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
          VITE_LEARNING_URL: ${{ secrets.VITE_LEARNING_URL }}
          VITE_METABOX_LANDING_URL: ${{ secrets.VITE_METABOX_LANDING_URL }}

      - name: Clear webapp dir on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: rm -rf /var/www/metabox/*

      - name: Upload webapp dist to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/webapp/dist/*"
          target: /var/www/metabox
          strip_components: 3

  # ── Pull new images and restart services on VPS ─────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [changes, build-api, build-bot, build-worker, build-webapp]
    permissions:
      contents: write
    if: |
      always() && !cancelled() &&
      (needs.build-api.result == 'success' ||
       needs.build-bot.result == 'success' ||
       needs.build-worker.result == 'success') &&
      needs.build-api.result != 'failure' &&
      needs.build-bot.result != 'failure' &&
      needs.build-worker.result != 'failure'
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.changes.outputs.sha }}
          GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE_TAG,GHCR_IMAGE_PREFIX
          script: |
            set -e
            cd /opt/metaboxaibot

            echo "Logging in to ghcr.io..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Updating repo (compose file, nginx config)..."
            git -c "url.https://x-access-token:${GHCR_TOKEN}@github.com/.insteadOf=https://github.com/" pull origin main

            echo "Updating IMAGE_TAG and GHCR_IMAGE_PREFIX in .env..."
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env \
              || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            sed -i "s|^GHCR_IMAGE_PREFIX=.*|GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX|" .env \
              || echo "GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX" >> .env

            echo "Pulling new images..."
            docker compose -f docker-compose.prod.yml pull bot api worker

            echo "Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans

            echo "Pruning old images..."
            docker image prune -af

            sudo nginx -t && sudo systemctl reload nginx

            echo "Deploy complete — $IMAGE_TAG"

      # Move the prod-deployed tag to the current SHA so the next run
      # only rebuilds what actually changed since this deploy.
      - name: Mark deployed SHA
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.changes.outputs.sha }}';
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/prod-deployed',
                sha,
                force: true,
              });
            } catch {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/prod-deployed',
                sha,
              });
            }
