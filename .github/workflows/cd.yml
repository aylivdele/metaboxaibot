name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# Only one deployment at a time; a newer push cancels the queued one
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build & push Docker images in parallel ──────────────────────────────────
  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/Dockerfile.api
          - service: bot
            dockerfile: infra/docker/Dockerfile.bot
          - service: worker
            dockerfile: infra/docker/Dockerfile.worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/metabox-${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
          # GitHub Actions layer cache — next build reuses unchanged layers
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Build React webapp and upload to VPS ────────────────────────────────────
  build-webapp:
    name: Build & deploy webapp
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build webapp
        run: pnpm --filter @metabox/webapp build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}

      - name: Upload webapp dist to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/webapp/dist/*"
          target: /var/www/metabox
          strip_components: 3
          rm: true

  # ── Pull new images and restart services on VPS ─────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-images, build-webapp]

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE_TAG
          script: |
            set -e
            cd /opt/metaboxaibot

            echo "Logging in to ghcr.io..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Updating IMAGE_TAG in .env to $IMAGE_TAG..."
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env || echo "IMAGE_TAG=$IMAGE_TAG" >> .env

            echo "Pulling new images..."
            docker compose -f docker-compose.prod.yml pull bot api worker

            echo "Restarting services with zero-downtime..."
            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans

            echo "Pruning old images..."
            docker image prune -f

            echo "Reloading nginx..."
            # nginx.server.conf is symlinked to /etc/nginx/sites-available/metabox
            # (set up once: ln -sf /opt/metaboxaibot/infra/nginx/nginx.server.conf /etc/nginx/sites-available/metabox)
            # git pull above already updated the source file — just test and reload
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deploy complete — $IMAGE_TAG"
