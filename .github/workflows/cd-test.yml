name: CD → Test

on:
  # Runs automatically after CI passes on develop
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]

  # Manual trigger — use force_all to rebuild everything regardless of changes
  workflow_dispatch:
    inputs:
      force_all:
        description: "Пересобрать и задеплоить все модули"
        type: boolean
        default: false

# Only one test deployment at a time per branch; newer push cancels the queued one.
# Branch is included in the group key so a main CI run can never cancel a develop deploy.
concurrency:
  group: deploy-test-${{ github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Detect which modules changed ────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # For workflow_run: only proceed when CI ran on develop (not main or PRs)
    # and the run succeeded. The `branches` filter in `on.workflow_run` is not
    # reliable enough on its own — an explicit head_branch check is required.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'develop')
    outputs:
      api: ${{ steps.filter.outputs.api }}
      bot: ${{ steps.filter.outputs.bot }}
      worker: ${{ steps.filter.outputs.worker }}
      webapp: ${{ steps.filter.outputs.webapp }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Resolve SHA
        id: sha
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      # Abort if a newer commit has already been deployed or is being deployed.
      # workflow_run events arrive out of order: a re-run of an old CI job can
      # fire AFTER a newer CI run and — with cancel-in-progress — would otherwise
      # cancel the correct deploy and start one for the stale SHA.
      - name: Skip if SHA is not latest on develop
        id: stale-check
        if: github.event_name == 'workflow_run'
        run: |
          git fetch origin develop --depth=1
          LATEST=$(git rev-parse origin/develop)
          SHA="${{ steps.sha.outputs.sha }}"
          if [ "$SHA" != "$LATEST" ]; then
            echo "::warning::SHA $SHA is not the latest on develop (HEAD: $LATEST). Skipping stale deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Compares HEAD against the last deployed tag via plain git diff.
      # Falls back to building everything when the tag doesn't exist yet,
      # or when force_all is requested via workflow_dispatch.
      - name: Detect changes
        id: filter
        run: |
          set -e

          # force_all or first run → build everything
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin refs/tags/test-deployed:refs/tags/test-deployed 2>/dev/null || true

          if ! git rev-parse --verify test-deployed >/dev/null 2>&1; then
            echo "No test-deployed tag found — building everything"
            echo "api=true"    >> "$GITHUB_OUTPUT"
            echo "bot=true"    >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only test-deployed HEAD)
          echo "Changed files since test-deployed:"
          echo "$changed"

          match() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          echo "api=$(match    '^(packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.api)')"    >> "$GITHUB_OUTPUT"
          echo "bot=$(match    '^(packages/bot|packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.bot)')"    >> "$GITHUB_OUTPUT"
          echo "worker=$(match '^(packages/worker|packages/api|packages/shared|prisma|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.worker)')" >> "$GITHUB_OUTPUT"
          echo "webapp=$(match '^(packages/webapp|packages/shared|pnpm-lock\.yaml|package\.json|infra/docker/Dockerfile\.webapp)')" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker images ───────────────────────────────────────────────
  build-api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-api:test
            ghcr.io/${{ github.repository_owner }}/metabox-api:test-${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=api-test
          cache-to: type=gha,scope=api-test,mode=max

  build-bot:
    name: Build Bot
    needs: changes
    if: needs.changes.outputs.bot == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bot
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-bot:test
            ghcr.io/${{ github.repository_owner }}/metabox-bot:test-${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=bot-test
          cache-to: type=gha,scope=bot-test,mode=max

  build-worker:
    name: Build Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/metabox-worker:test
            ghcr.io/${{ github.repository_owner }}/metabox-worker:test-${{ needs.changes.outputs.sha }}
          cache-from: type=gha,scope=worker-test
          cache-to: type=gha,scope=worker-test,mode=max

  # ── Build React webapp and upload to test VPS ────────────────────────────────
  build-webapp:
    name: Build & deploy webapp
    needs: changes
    if: needs.changes.outputs.webapp == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build webapp
        run: pnpm --filter @metabox/webapp build
        env:
          VITE_API_BASE_URL: ${{ secrets.TEST_VITE_API_BASE_URL }}
          VITE_BOT_USERNAME: ${{ secrets.TEST_VITE_BOT_USERNAME }}
          VITE_LEARNING_URL: ${{ secrets.TEST_VITE_LEARNING_URL }}
          VITE_METABOX_LANDING_URL: ${{ secrets.TEST_VITE_METABOX_LANDING_URL }}

      - name: Clear webapp dir on test VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          script: rm -rf /var/www/metabox-ai-test/*

      - name: Upload webapp dist to test VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          source: "packages/webapp/dist/*"
          target: /var/www/metabox-ai-test
          strip_components: 3

  # ── Pull new images and restart services on test VPS ────────────────────────
  deploy:
    name: Deploy to test VPS
    runs-on: ubuntu-latest
    needs: [changes, build-api, build-bot, build-worker, build-webapp]
    permissions:
      contents: write
    # Run if at least one backend image was (re)built; skip if everything was skipped
    if: |
      always() && !cancelled() &&
      (needs.build-api.result == 'success' ||
       needs.build-bot.result == 'success' ||
       needs.build-worker.result == 'success') &&
      needs.build-api.result != 'failure' &&
      needs.build-bot.result != 'failure' &&
      needs.build-worker.result != 'failure'
    steps:
      - name: Deploy on test VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE_TAG: test-${{ needs.changes.outputs.sha }}
          GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        with:
          host: ${{ secrets.TEST_VPS_HOST }}
          username: ${{ secrets.TEST_VPS_USER }}
          key: ${{ secrets.TEST_VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,IMAGE_TAG,GHCR_IMAGE_PREFIX
          script: |
            set -e
            cd /opt/metaboxaibot-test

            echo "Logging in to ghcr.io..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Updating repo (compose file, nginx config)..."
            git -c "url.https://x-access-token:${GHCR_TOKEN}@github.com/.insteadOf=https://github.com/" pull origin develop

            echo "Updating IMAGE_TAG and GHCR_IMAGE_PREFIX in .env..."
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env \
              || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            sed -i "s|^GHCR_IMAGE_PREFIX=.*|GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX|" .env \
              || echo "GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX" >> .env

            echo "Pulling new images..."
            docker compose -f docker-compose.test.yml pull bot api worker

            echo "Restarting services..."
            docker compose -f docker-compose.test.yml up -d --no-build --remove-orphans

            echo "Pruning old images..."
            docker image prune -af

            sudo nginx -t && sudo nginx -s reload

            echo "Test deploy complete — $IMAGE_TAG"

      # Move the test-deployed tag to the current SHA so the next run
      # only rebuilds what actually changed since this deploy.
      - name: Mark deployed SHA
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.changes.outputs.sha }}';
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/test-deployed',
                sha,
                force: true,
              });
            } catch {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/tags/test-deployed',
                sha,
              });
            }
