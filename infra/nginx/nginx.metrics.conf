# Host nginx config exposing node-exporter + cAdvisor over HTTPS so the
# central Prometheus on the metabox-site stage server can scrape them.
#
# Place at /etc/nginx/sites-available/metabox-metrics, symlink to
# sites-enabled, then:
#   1. certbot --nginx -d metrics.aibox.metabox.global
#   2. nginx -t && systemctl reload nginx
#
# Container ports (bound to 127.0.0.1 only by docker-compose.observability.yml):
#   - node-exporter  → 127.0.0.1:9100
#   - cadvisor       → 127.0.0.1:8080
#
# The two locations below are the public surface. The `/` location returns
# 403 so probes / scanners hitting the bare host don't reveal anything.

server {
    listen 80;
    server_name metrics.aibox.metabox.global;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name metrics.aibox.metabox.global;

    ssl_certificate     /etc/letsencrypt/live/metrics.aibox.metabox.global/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metrics.aibox.metabox.global/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Stage Prometheus scrapes every 15s — burst lets a few back-to-back
    # requests through (e.g. on stage Prom restart) before throttling.
    # Uses `api_limit` zone defined in nginx.server.conf (45r/m).
    location /node {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:9100/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /cadvisor {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        return 403;
    }
}
